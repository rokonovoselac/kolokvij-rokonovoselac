
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Login to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}
          registry: fra.ocir.io
          username: ${{ secrets.OCIR_NAMESPACE }}/rnovosela23@unizd.hr

      - name: Build Docker image
        run: |
          docker build -t fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }} .
          docker tag fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }} fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:latest

      - name: Push Docker image
        run: |
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }}
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}
          region: ${{ secrets.OCI_CLI_REGION }}
          tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          user: ${{ secrets.OCI_CLI_USER }}
          fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Replace image placeholder
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }}|g' k8s/kolokvij-deploy.yaml

      - name: Deploy
        run: kubectl apply -f k8s/kolokvij-deploy.yaml

      - name: Rollout
        run: kubectl rollout status deployment/kolokvij

      - name: Smoke Test
        run: |
          sleep 60
          EXTERNAL_IP=$(kubectl get svc kolokvij-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl http://$EXTERNAL_IP:8080/hello/Kolokvij
