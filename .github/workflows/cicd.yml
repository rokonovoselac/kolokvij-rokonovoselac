name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login fra.ocir.io -u "${{ secrets.OCIR_NAMESPACE }}/rnovosela23@unizd.hr" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }} .
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    env:
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Deploy
        run: kubectl apply -f k8s/kolokvij-deploy.yaml

      - name: Rollout
        run: kubectl rollout status deployment/kolokvij
